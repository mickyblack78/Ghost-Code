<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ghoster</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1e1e1e; color: #fff; overflow: hidden; }
        #editor { width: 100vw; height: 100vh; background: #1e1e1e; color: #d4d4d4; border: none; padding: 10px; font-family: monospace; font-size: 14px; resize: none; outline: none; }
        
        /* The UI Layer */
        .controls { position: fixed; top: 10px; left: 10px; display: flex; gap: 5px; z-index: 100; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 4px 8px; cursor: pointer; font-size: 12px; }
        button:hover { background: #444; }

        /* Preview Overlay */
        #preview-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Tiny Top-Corner Refresh/Close */
        #close-btn { position: absolute; top: 5px; right: 5px; background: #ff4444; border: none; color: white; padding: 2px 6px; cursor: pointer; z-index: 1001; font-size: 10px; }
        
        /* Load Menu */
        #load-menu { position: absolute; top: 35px; left: 0; background: #252526; border: 1px solid #444; display: none; flex-direction: column; min-width: 120px; }
        #load-menu button { border: none; text-align: left; width: 100%; padding: 8px; }
        .show { display: flex !important; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="toggleLoad()">LOAD</button>
    <button onclick="runAndPreview()">RUN</button>
    <button onclick="saveFile()">SAVE</button>
    
    <div id="load-menu">
        <button onclick="document.getElementById('file-input').click()">Import File</button>
        <div id="recent-list"></div>
    </div>
</div>

<input type="file" id="file-input" style="display:none" onchange="importFile(event)">
<textarea id="editor" placeholder="Write HTML/JS here..."></textarea>

<div id="preview-container">
    <button id="close-btn" onclick="closePreview()">X</button>
    <iframe id="preview-frame"></iframe>
</div>

<script>
    const editor = document.getElementById('editor');
    const previewContainer = document.getElementById('preview-container');
    const previewFrame = document.getElementById('preview-frame');
    const loadMenu = document.getElementById('load-menu');

    // RUN & PREVIEW TOGGLE
    function runAndPreview() {
        const code = editor.value;
        previewContainer.style.display = 'block';
        const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        doc.open();
        doc.write(code);
        doc.close();
    }

    function closePreview() {
        previewContainer.style.display = 'none';
        previewFrame.src = "about:blank";
    }

    // LOAD SYSTEM
    function toggleLoad() {
        loadMenu.classList.toggle('show');
    }

    function importFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            editor.value = e.target.result;
            addToRecents(file.name, e.target.result);
        };
        reader.readAsText(file);
        loadMenu.classList.remove('show');
    }

    // SAVE SYSTEM
    function saveFile() {
        const blob = new Blob([editor.value], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'project.html';
        a.click();
    }

    // RECENT FILES (Local Storage)
    function addToRecents(name, content) {
        let recents = JSON.parse(localStorage.getItem('recents') || '[]');
        recents = recents.filter(r => r.name !== name);
        recents.unshift({ name, content });
        if (recents.length > 5) recents.pop();
        localStorage.setItem('recents', JSON.stringify(recents));
        renderRecents();
    }

    function renderRecents() {
        const list = document.getElementById('recent-list');
        const recents = JSON.parse(localStorage.getItem('recents') || '[]');
        list.innerHTML = recents.map(r => `<button onclick="loadRecent('${r.name}')">${r.name}</button>`).join('');
    }

    function loadRecent(name) {
        const recents = JSON.parse(localStorage.getItem('recents') || '[]');
        const item = recents.find(r => r.name === name);
        if (item) editor.value = item.content;
        loadMenu.classList.remove('show');
    }

    window.onload = renderRecents;
</script>

</body>
</html>
