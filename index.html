<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghoster</title>
    <style>
        .controls {
    position: fixed;
    cursor: move; /* Shows the 'grab' icon */
    touch-action: none; /* Crucial for mobile: stops the screen from scrolling while you drag */
    user-select: none; /* Stops you from accidentally highlighting text while dragging */
        }
        body { margin: 0; font-family: sans-serif; background: #1e1e1e; color: white; overflow: hidden; }
        #editor { width: 100vw; height: 100vh; background: #1e1e1e; color: #d4d4d4; border: none; padding: 10px; font-family: monospace; font-size: 14px; resize: none; outline: none; }
        
        /* The UI Layer */
        .controls { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 100; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 4px 8px; cursor: pointer; font-size: 12px; }
        button:hover { background: #444; }

        /* Preview Overlay */
        #preview-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Tiny Top-Corner Refresh/Close */
        #close-btn { position: absolute; top: 5px; right: 5px; background: #ff4444; border: none; color: white; padding: 2px 6px; cursor: pointer; z-index: 1001; font-size: 10px; }
        
        /* Load & Save Menus */
        #load-menu, #save-menu { position: absolute; bottom: 35px; left: 0; background: #252526; border: 1px solid #444; display: none; flex-direction: column; min-width: 120px; }
        #load-menu button, #save-menu button { border: none; text-align: left; width: 100%; padding: 8px; }
        .show { display: flex !important; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="toggleLoad()">LOAD</button>
    <button onclick="runAndPreview()">RUN</button>
    <button onclick="toggleSave()">SAVE</button>
    
    <div id="load-menu">
        <button onclick="document.getElementById('file-input').click()">Import File</button>
        <div id="recent-list"></div>
    </div>

    <div id="save-menu">
        <button onclick="saveFile('project.html')">Quick Save</button>
        <button onclick="saveAsFile()">Save As...</button>
    </div>
</div>

<input type="file" id="file-input" style="display:none" onchange="importFile(event)">
<textarea id="editor" placeholder="Write HTML/JS here..."></textarea>

<div id="preview-container">
    <button id="close-btn" onclick="closePreview()">X</button>
    <iframe id="preview-frame"></iframe>
</div>

<script>
    const dragContainer = document.querySelector(".controls");
let active = false;
let currentX;
let currentY;
let initialX;
let initialY;
let xOffset = 0;
let yOffset = 0;

// Listen for touch (mobile) and mouse (desktop)
dragContainer.addEventListener("touchstart", dragStart, false);
dragContainer.addEventListener("touchend", dragEnd, false);
dragContainer.addEventListener("touchmove", drag, false);

dragContainer.addEventListener("mousedown", dragStart, false);
dragContainer.addEventListener("mouseup", dragEnd, false);
dragContainer.addEventListener("mousemove", drag, false);

function dragStart(e) {
    if (e.type === "touchstart") {
        initialX = e.touches[0].clientX - xOffset;
        initialY = e.touches[0].clientY - yOffset;
    } else {
        initialX = e.clientX - xOffset;
        initialY = e.clientY - yOffset;
    }
    if (e.target === dragContainer || dragContainer.contains(e.target)) {
        active = true;
    }
}

function dragEnd() {
    initialX = currentX;
    initialY = currentY;
    active = false;
}

function drag(e) {
    if (active) {
        e.preventDefault();
        if (e.type === "touchmove") {
            currentX = e.touches[0].clientX - initialX;
            currentY = e.touches[0].clientY - initialY;
        } else {
            currentX = e.clientX - initialX;
            currentY = e.clientY - initialY;
        }
        xOffset = currentX;
        yOffset = currentY;
        setTranslate(currentX, currentY, dragContainer);
    }
}

function setTranslate(xPos, yPos, el) {
    el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
}
    const editor = document.getElementById('editor');
    const previewContainer = document.getElementById('preview-container');
    const previewFrame = document.getElementById('preview-frame');
    const loadMenu = document.getElementById('load-menu');
    const saveMenu = document.getElementById('save-menu');

    // RUN & PREVIEW TOGGLE
    function runAndPreview() {
        const code = editor.value;
        previewContainer.style.display = 'block';
        const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        doc.open();
        doc.write(code);
        doc.close();
    }

    function closePreview() {
        previewContainer.style.display = 'none';
        previewFrame.src = "about:blank";
    }

    // LOAD SYSTEM
    function toggleLoad() {
        saveMenu.classList.remove('show');
        loadMenu.classList.toggle('show');
    }

    function importFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            editor.value = e.target.result;
            addToRecents(file.name, e.target.result);
        };
        reader.readAsText(file);
        loadMenu.classList.remove('show');
    }

    // SAVE SYSTEM
    function toggleSave() {
        loadMenu.classList.remove('show');
        saveMenu.classList.toggle('show');
    }

    function saveFile(filename) {
        const blob = new Blob([editor.value], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename || 'project.html';
        a.click();
        saveMenu.classList.remove('show');
    }

    function saveAsFile() {
        const filename = prompt("Enter filename:", "project.html");
        if (filename) saveFile(filename);
    }

    // RECENT FILES (Local Storage)
    function addToRecents(name, content) {
        let recents = JSON.parse(localStorage.getItem('recents') || '[]');
        recents = recents.filter(r => r.name !== name);
        recents.unshift({ name, content });
        if (recents.length > 5) recents.pop();
        localStorage.setItem('recents', JSON.stringify(recents));
        renderRecents();
    }

    function renderRecents() {
        const list = document.getElementById('recent-list');
        const recents = JSON.parse(localStorage.getItem('recents') || '[]');
        list.innerHTML = recents.map(r => `<button onclick="loadRecent('${r.name}')">${r.name}</button>`).join('');
    }

    function loadRecent(name) {
        const recents = JSON.parse(localStorage.getItem('recents') || '[]');
        const item = recents.find(r => r.name === name);
        if (item) editor.value = item.content;
        loadMenu.classList.remove('show');
    }

    window.onload = renderRecents;
    // ... all your existing code ...

// Just add this at the very bottom of the same script:
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
